<!--
  Google Search Console Verification File
  ========================================

  HOW TO USE:
  1. Go to Google Search Console: https://search.google.com/search-console/
  2. Add your site as a property
  3. Choose "HTML file" verification method
  4. Google will give you a file named something like: google1234567890abcdef.html
  5. Delete this placeholder file
  6. Download the actual verification file from Google and place it in this
     public/ directory with the exact filename Google provides
  7. Deploy your site
  8. Click "Verify" in Google Search Console

  The actual verification file will contain something like:
  google-site-verification: google1234567890abcdef.html
-->
